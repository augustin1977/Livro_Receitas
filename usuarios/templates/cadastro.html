{% extends 'base.html' %}
{% block 'titulo' %} Cadastro {% endblock %}
{% block 'menu'%} 
    {% if request.user and request.user.is_staff %}   
        {% include 'menu_basico.html' %}
    {% endif%}
{% endblock %}
{% block 'conteudo' %} 



<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h1 class="text-center mb-4">Cadastre-se</h1>
                <hr>
                
                <form method="POST" action="{% url 'valida_cadastro' %}"> {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Nome de Usuário (Nickname / Login)</label>
                        <input name="username" class="form-control" type="text" placeholder="Ex: joão.ninguem" value="{{ username_digitado }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input name="nome" class="form-control" type="text" placeholder="Seu nome" value="{{ nome_digitado }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">E-mail de Recuperação</label>
                        <input name="email" class="form-control" type="email" placeholder="nome@servidor.com" value="{{ email_digitado }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input name="senha" class="form-control" type="password" placeholder="Mínimo 6 caracteres alfanuméricos" required>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <input class="btn btn-success" type="submit" value="Enviar Cadastro">
                        <a href="{% url 'home' %}" class="btn btn-warning">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
