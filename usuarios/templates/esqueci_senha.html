{% extends 'base.html' %}
{% block 'titulo' %} Esqueci Minha Senha {% endblock %}

{% block 'conteudo' %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h1 class="text-center mb-4">Recuperar Senha</h1>
                <hr>

                <p class="text-muted">
                    Informe o e-mail cadastrado. Enviaremos uma senha provisória para você acessar o sistema.
                </p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">E-mail cadastrado</label>
                        <input name="email" class="form-control" type="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-success" type="submit">Enviar Senha Provisória</button>
                        <a href="{% url 'login' %}" class="btn btn-warning">Voltar para Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
