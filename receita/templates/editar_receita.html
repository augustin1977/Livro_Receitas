{% extends 'base.html' %}
{% block 'titulo' %} Editar Receita {% endblock %}
{% block 'menu'%} 
{% include 'menu_basico.html' %}
{% endblock %}

{% block 'conteudo' %} 
<div class="container mt-4">
    <h5>Editar Receita</h5>
    <hr>
    
    <form method="POST" onsubmit="prepararEnvio()"> {% csrf_token %}
        
        <label class="form-label">Nome da Receita</label>
        <input name="nome" class="form-control" type="text" value="{{ receita.nome }}" required>
        <br> 
        
        <div class="row bg-light p-3 rounded border mb-3">
            <div class="col-md-5">
                <label class="form-label">Material (Ingrediente)</label>
                <select id="material" class="form-control"> 
                    <option value="">Selecione o ingrediente...</option>
                    {% for mat in materiais %}
                        <option value="{{ mat.id }}">{{ mat.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="col-md-3">
                <label class="form-label">Quantidade</label>
                <input id="quantidade" class="form-control" type="number" step="0.01" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label">Unidade de Medida</label>
                <select id="unidade" class="form-control"> 
                    <option value="">Selecione a unidade...</option>
                    {% for uni in unidades %}
                        <option value="{{ uni.id }}">{{ uni.unidades }} ({{ uni.simbolo }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 mt-3">
                <button type="button" onclick="adicionarIngrediente()" class="btn btn-info btn-blue">
                    + Adicionar à Tabela
                </button>
            </div>
        </div>

        <label class="form-label">Ingredientes da Receita</label>
        <table class="table table-bordered table-hover mb-3">
            <thead class="table-secondary">
                <tr>
                    <th>Ingrediente</th>
                    <th>Quantidade / Unidade</th>
                    <th width="80" class="text-center">Ação</th>
                </tr>
            </thead>
            <tbody id="TabelaVisual">
                </tbody>
        </table>

        <input type="hidden" id="IngredientesSelecionados" name="IngredientesSelecionados" required>

        <label class="form-label">Modo de Preparo</label>
        <textarea id="receita" name="ModoPreparo" class="form-control" rows="6" required>{{ receita.modo_de_fazer }}</textarea>
        <br>

        <input class="btn btn-success" type="submit" value="Salvar Alterações">
        <a href="{% url 'home' %}" class="btn btn-warning">Cancelar</a>
    </form>
</div>

<script>
    var listaIngredientes = [];

    // Carrega os dados existentes do banco de dados para a memória do JavaScript
    window.onload = function() {
        {% for ing in receita.ingredientes.all %}
            listaIngredientes.push({
                id: Date.now() + Math.random(), // Evita chaves duplicadas no loop rápido
                backend: "{{ ing.material.id }};{{ ing.quantidade|stringformat:'.2f' }};{{ ing.unidade.id }}",
                textoNome: "{{ ing.material.nome }}",
                textoMedida: "{{ ing.quantidade }} {{ ing.unidade.simbolo }}"
            });
        {% endfor %}
        
        renderizarTabela();
    };

    function adicionarIngrediente() {
        var materialSelect = document.getElementById("material");
        var quantidadeInput = document.getElementById("quantidade");
        var unidadeSelect = document.getElementById("unidade");
        
        var materialId = materialSelect.value;
        var materialNome = materialSelect.options[materialSelect.selectedIndex].text;
        var quantidade = quantidadeInput.value;
        var unidadeId = unidadeSelect.value;
        var unidadeSimbolo = '';
        
        if (unidadeSelect.selectedIndex > 0) {
            var textoUnidade = unidadeSelect.options[unidadeSelect.selectedIndex].text;
            unidadeSimbolo = textoUnidade.substring(textoUnidade.indexOf('(') + 1, textoUnidade.indexOf(')'));
        }

        if (!materialId || !quantidade || !unidadeId) {
            alert("Por favor, preencha o ingrediente, a quantidade e a unidade.");
            return;
        }

        var novoIngrediente = {
            id: Date.now(), 
            backend: materialId + ";" + quantidade + ";" + unidadeId,
            textoNome: materialNome,
            textoMedida: quantidade + " " + unidadeSimbolo
        };
        
        listaIngredientes.push(novoIngrediente);
        renderizarTabela();
        
        materialSelect.value = "";
        quantidadeInput.value = "";
        unidadeSelect.value = "";
    }

    function renderizarTabela() {
        var tbody = document.getElementById("TabelaVisual");
        tbody.innerHTML = ""; 

        if (listaIngredientes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center">Nenhum ingrediente adicionado...</td></tr>';
            return;
        }

        listaIngredientes.forEach(function(item) {
            var tr = document.createElement("tr");
            tr.innerHTML = "<td>" + item.textoNome + "</td>" +
                           "<td>" + item.textoMedida + "</td>" +
                           '<td class="text-center">' +
                           '<button type="button" class="btn btn-sm btn-outline-danger" onclick="removerIngrediente(' + item.id + ')">' +
                           '<i class="bi bi-trash"></i>' +
                           '</button>' +
                           '</td>';
            tbody.appendChild(tr);
        });
    }

    function removerIngrediente(idParaRemover) {
        listaIngredientes = listaIngredientes.filter(function(item) {
            return item.id !== idParaRemover;
        });
        renderizarTabela();
    }

    function prepararEnvio() {
        var campoOculto = document.getElementById("IngredientesSelecionados");
        var stringsBackend = listaIngredientes.map(function(item) {
            return item.backend;
        });
        campoOculto.value = stringsBackend.join("\n");
    }
</script>
{% endblock %}
